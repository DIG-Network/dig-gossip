domain_id: discovery
normative: ./NORMATIVE.md
verification: ./VERIFICATION.md
items:
  - id: DSC-001
    section: "6.3"
    summary: "AddressManager with tried/new tables"
    status: verified
    spec_ref: "SPEC.md#63-address-manager-rust-port-no-crate-exists"
    tests:
      - tests/dsc_001_tests.rs
    notes: >
      discovery/address_manager.rs ports Chia address_manager.py (SHA-256 std_hash bucketing, tried/new matrices,
      mark_good collisions, select_peer). Public API is synchronous Mutex-wrapped (call sites are sync).
      Peers-file load/save is DSC-002 (create loads non-empty snapshot). One stress eviction test is #[ignore]d for CI speed.
  - id: DSC-002
    section: "6.3"
    summary: "Address manager persistence (save/load)"
    status: verified
    spec_ref: "SPEC.md#63-address-manager-rust-port-no-crate-exists"
    tests:
      - tests/dsc_002_tests.rs
    notes: >
      address_manager_store.rs: bincode v1 snapshot with atomic write; AddressManager::create restores from peers file;
      GossipError::AddressManagerStore on corrupt/version mismatch. ServiceState::new propagates load errors.
  - id: DSC-003
    section: "6.2"
    summary: "DNS seeding via Network::lookup_all()"
    status: verified
    spec_ref: "SPEC.md#62-dns-seeding-reuses-chia-sdk-clientnetwork"
    tests:
      - tests/dsc_003_tests.rs
    notes: >
      node_discovery.rs: dns_lookup_seed_addrs -> Network::lookup_all; GossipConfig dns_seed_timeout / dns_seed_batch_size;
      timestamped_peer_infos_from_dns_addrs + merge_dns_seed_addrs_into_address_manager + dns_seed_resolve_and_merge.
  - id: DSC-004
    section: "6.5"
    summary: "Introducer query (get_peers)"
    status: verified
    spec_ref: "SPEC.md#65-introducer-client-dig-extension"
    tests:
      - tests/dsc_004_tests.rs
    notes: >
      introducer_client.rs: IntroducerClient::query_peers (WSS+mTLS, Handshake, request_infallible RequestPeersIntroducer);
      introducer_wire.rs: streamable wire types for opcodes 63/64; GossipHandle::discover_from_introducer delegates here.
      STR-005 wss_full_node::spawn_one_shot_introducer for integration tests.
  - id: DSC-005
    section: "6.5"
    summary: "Introducer registration (register_peer)"
    status: verified
    spec_ref: "SPEC.md#65-introducer-client-dig-extension"
    tests:
      - tests/dsc_005_tests.rs
    notes: >
      vendor/chia-protocol: ProtocolMessageTypes RegisterPeer=218 / RegisterAck=219 so Message decode works;
      introducer_register_wire.rs: streamable bodies; IntroducerClient::register_with_introducer;
      GossipHandle::register_with_introducer -> RegisterAck; empty introducer.endpoint -> InvalidConfig;
      STR-005 wss_full_node::spawn_one_shot_introducer_register; DigMessageType 218/219 + inbound dig_wire limits.
  - id: DSC-006
    section: "6.4"
    summary: "Discovery loop with DNS-first and backoff"
    status: verified
    spec_ref: "SPEC.md#64-discovery-loop-rust-port-improved"
    tests:
      - tests/dsc_006_tests.rs
    notes: >
      node_discovery.rs: run_discovery_loop (async, CancellationToken, action_log channel).
      DNS-first seeding via dns_seed_resolve_and_merge. Introducer fallback via try_introducer_query.
      Exponential backoff 1s→2s→4s→...→300s cap. Backoff resets on success. 5s cycle sleep when
      peers available. DiscoveryAction enum for test observability. tokio-util CancellationToken
      for clean shutdown (CNC-004). tokio::select! for cancellation-aware sleeps.
  - id: DSC-007
    section: "6.6"
    summary: "Peer exchange (RequestPeers/RespondPeers)"
    status: verified
    spec_ref: "SPEC.md#66-peer-exchange-via-gossip"
    tests:
      - tests/dsc_007_tests.rs
    notes: >
      cap_received_peers() in node_discovery.rs applies SPEC §1.6#10 (1000/request) and §1.6#11 (3000 total).
      gossip_handle.rs connect_to() calls cap_received_peers before add_to_new_table.
      ServiceState.total_peers_received AtomicU64 counter for global cap tracking.
      Constants MAX_PEERS_RECEIVED_PER_REQUEST=1000, MAX_TOTAL_PEERS_RECEIVED=3000 in constants.rs.
    tests: []
    notes: ""
  - id: DSC-008
    section: "6.4"
    summary: "Feeler connections on Poisson schedule"
    status: verified
    spec_ref: "SPEC.md#64-discovery-loop-rust-port-improved"
    tests:
      - tests/dsc_008_tests.rs
    notes: >
      node_discovery.rs: poisson_next_interval() generates exponential distribution intervals.
      run_feeler_loop() selects from new table (select_peer(true)), calls mark_good() on success.
      FEELER_INTERVAL_SECS=240 in constants.rs. FeelerAction enum for test observability.
      Feelers don't participate in gossip — connection closed after promotion.
      Actual TCP/TLS connect deferred to DSC-009 (parallel connection establishment).
  - id: DSC-009
    section: "6.4"
    summary: "Parallel connection establishment"
    status: verified
    tests:
      - tests/dsc_009_tests.rs
    notes: >
      parallel_connect_batch() in node_discovery.rs uses FuturesUnordered for concurrent connects.
      PARALLEL_CONNECT_BATCH_SIZE=8. ConnectResult enum (Success/Failure/Skipped).
      mark_good on success, attempt(true) on failure. Actual TCP deferred — simulated in Phase 3.
    spec_ref: "SPEC.md#64-discovery-loop-rust-port-improved"
    tests: []
    notes: ""
  - id: DSC-010
    section: "6.4"
    summary: "AS-level diversity enforcement"
    status: verified
    spec_ref: "SPEC.md#64-discovery-loop-rust-port-improved"
    tests:
      - tests/dsc_010_tests.rs
    notes: >
      util/as_lookup.rs: AsLookupTable (sorted entries, longest-prefix-match), AsDiversityFilter
      (HashSet<AsNumber> tracking). Fail-open for unknown IPs. No BGP data = all allowed (/16 sole guard).
  - id: DSC-011
    section: "6.4"
    summary: "/16 group filter for outbound connections"
    status: verified
    tests:
      - tests/dsc_011_tests.rs
    notes: >
      util/ip_address.rs: subnet_group() returns u32 group key (IPv4: 2 octets, IPv6: 4 bytes).
      SubnetGroupFilter wraps HashSet<u32>. Fast O(1) check before AS filter (DSC-010).
    status: gap
    spec_ref: "SPEC.md#64-discovery-loop-rust-port-improved"
    tests: []
    notes: ""
  - id: DSC-012
    section: "6.5"
    summary: "IntroducerPeers/VettedPeer tracking"
    status: verified
    spec_ref: "SPEC.md#65-introducer-client-dig-extension"
    tests:
      - tests/dsc_012_tests.rs
    notes: >
      introducer_peers.rs: IntroducerPeers (HashSet<VettedPeer>) with add/remove/record_success/record_failure.
      VettedPeer Hash/Eq by (host,port) only (Chia introducer_peers.py:29-30).
      State machine: 0→positive on success, 0→negative on failure, positive→-1 on failure, negative→1 on success.
      get_vetted_peers() returns only vetted > 0.
