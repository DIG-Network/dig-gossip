items:
  - id: DSC-001
    section: "6.3"
    summary: "AddressManager with tried/new tables"
    status: verified
    spec_ref: "SPEC.md#63-address-manager-rust-port-no-crate-exists"
    tests:
      - tests/dsc_001_tests.rs
    notes: >
      discovery/address_manager.rs ports Chia address_manager.py (SHA-256 std_hash bucketing, tried/new matrices,
      mark_good collisions, select_peer). Public API is synchronous Mutex-wrapped (call sites are sync).
      Peers-file load/save is DSC-002 (create loads non-empty snapshot). One stress eviction test is #[ignore]d for CI speed.
  - id: DSC-002
    section: "6.3"
    summary: "Address manager persistence (save/load)"
    status: verified
    spec_ref: "SPEC.md#63-address-manager-rust-port-no-crate-exists"
    tests:
      - tests/dsc_002_tests.rs
    notes: >
      address_manager_store.rs: bincode v1 snapshot with atomic write; AddressManager::create restores from peers file;
      GossipError::AddressManagerStore on corrupt/version mismatch. ServiceState::new propagates load errors.
  - id: DSC-003
    section: "6.2"
    summary: "DNS seeding via Network::lookup_all()"
    status: verified
    spec_ref: "SPEC.md#62-dns-seeding-reuses-chia-sdk-clientnetwork"
    tests:
      - tests/dsc_003_tests.rs
    notes: >
      node_discovery.rs: dns_lookup_seed_addrs -> Network::lookup_all; GossipConfig dns_seed_timeout / dns_seed_batch_size;
      timestamped_peer_infos_from_dns_addrs + merge_dns_seed_addrs_into_address_manager + dns_seed_resolve_and_merge.
