  - id: STR-001
    section: "10.4, 10.3, 1.2"
    summary: "Cargo.toml dependencies and feature gates"
    status: verified
    spec_ref: "SPEC.md#104-cargotoml-dependencies"
    tests:
      - tests/str_001_tests.rs
    notes: >
      `minisketch-rs` is not declared: its build depends on `bindgen` (`links = "clang"`),
      which collides in Cargo’s resolver with `chia-sdk-client`’s optional `rustls` → `aws-lc-rs (bindgen)` edge even when only `native-tls` is enabled. The `erlay`
      feature remains an empty gate for cfg(feature = "erlay") until a pure-Rust
      sketch or upstream graph fix lands.
  - id: STR-002
    section: "10.1"
    summary: "Module hierarchy matches SPEC Section 10.1"
    status: verified
    spec_ref: "SPEC.md#101-module-structure"
    tests:
      - tests/str_002_tests.rs
    notes: >
      Implemented per STR-002 acceptance (types/, service/, connection/, discovery/, relay/, gossip/, util/).
      SPEC Section 10.1 also lists `privacy/` (dandelion, peer_id_rotation, tor); that subtree is not in the STR-002
      checklist and is deferred to the privacy domain work. `relay` is `#[cfg(feature = "relay")]` from lib.rs;
      `gossip/compact_block` and `gossip/erlay` are cfg-gated inside `gossip/mod.rs`.
