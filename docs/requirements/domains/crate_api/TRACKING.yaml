items:
  - id: API-001
    section: "3.1"
    summary: "GossipService constructor (new with GossipConfig)"
    status: verified
    spec_ref: "SPEC.md#31-construction"
    tests:
      - tests/api_001_tests.rs
    notes: >
      new() validates GossipConfig, ensure parent dirs, load_ssl_cert (upstream generate-if-missing),
      allocates ServiceState (AddressManager stub, LruCache seen set, peer map placeholder). start/stop
      use AtomicU8 lifecycle; GossipHandle::health_check gates until API-002. No Tokio tasks or binds
      in new(). API-004 enum extended only partially (ClientError, IoError, InvalidConfig,
      ServiceNotStarted, AlreadyStarted). Full peer disconnect on stop deferred to CON-*.
  - id: API-002
    section: "3.2, 3.3"
    summary: "GossipHandle methods (broadcast, send_to, request, peers, discovery, stats)"
    status: verified
    spec_ref: "SPEC.md#33-gossiphandle"
    tests:
      - tests/api_002_tests.rs
    notes: >
      Stub implementation: broadcast/send_to count stub peers and bump messages_broadcast_total;
      inbound_receiver returns broadcast::Receiver (SPEC shows mpsc — documented in gossip_handle.rs);
      request: RequestPeers/RespondPeers round-trip via TypeId fast-path, else RequestTimeout;
      connected_peers/get_connections return empty PeerConnection lists until CON-001;
      connect_to uses deterministic stub PeerId + caps; penalize_peer can auto-ban at threshold;
      introducer/discover/register/relay_stats stubs match config presence. See tests for matrix.
  - id: API-003
    section: "2.10"
    summary: "GossipConfig struct fields"
    status: verified
    spec_ref: "SPEC.md#210-gossipconfig"
    tests:
      - tests/api_003_tests.rs
    notes: >
      Full field set per API-003/SPEC §2.10 with STR-004 feature gates on dandelion, tor, erlay slots.
      DandelionConfig (privacy/dandelion), TorConfig + TorTransportConfig alias (privacy/tor), ErlayConfig
      (gossip/erlay), BackpressureConfig (gossip/backpressure), PeerIdRotationConfig (types/config).
      Nested configs are placeholders until PRV-*/ERL-*/PRI-* land. Default values use crate constants.
