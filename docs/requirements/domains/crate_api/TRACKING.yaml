domain_id: crate_api
normative: ./NORMATIVE.md
verification: ./VERIFICATION.md
items:
  - id: API-001
    section: "3.1"
    summary: "GossipService constructor (new with GossipConfig)"
    status: verified
    spec_ref: "SPEC.md#31-construction"
    tests:
      - tests/api_001_tests.rs
    notes: >
      new() validates GossipConfig, ensure parent dirs, load_ssl_cert (upstream generate-if-missing),
      allocates ServiceState (AddressManager stub, LruCache seen set, peer map placeholder). start/stop
      use AtomicU8 lifecycle; GossipHandle::health_check gates until API-002. No Tokio tasks or binds
      in new(). API-004 enum extended only partially (ClientError, IoError, InvalidConfig,
      ServiceNotStarted, AlreadyStarted). Full peer disconnect on stop deferred to CON-*.
  - id: API-002
    section: "3.2, 3.3"
    summary: "GossipHandle methods (broadcast, send_to, request, peers, discovery, stats)"
    status: verified
    spec_ref: "SPEC.md#33-gossiphandle"
    tests:
      - tests/api_002_tests.rs
    notes: >
      Stub implementation: broadcast/send_to count stub peers and bump GossipStats.messages_sent (API-008);
      inbound_receiver returns broadcast::Receiver (SPEC shows mpsc — documented in gossip_handle.rs);
      request: RequestPeers/RespondPeers round-trip via TypeId fast-path, else RequestTimeout;
      connected_peers/get_connections return empty PeerConnection lists until CON-001;
      connect_to uses deterministic stub PeerId + caps; penalize_peer can auto-ban at threshold;
      introducer/discover/register/relay_stats stubs match config presence. See tests for matrix.
  - id: API-003
    section: "2.10"
    summary: "GossipConfig struct fields"
    status: verified
    spec_ref: "SPEC.md#210-gossipconfig"
    tests:
      - tests/api_003_tests.rs
    notes: >
      Full field set per API-003/SPEC §2.10 with STR-004 feature gates on dandelion, tor, erlay slots.
      DandelionConfig (privacy/dandelion), TorConfig + TorTransportConfig alias (privacy/tor), ErlayConfig
      (gossip/erlay), BackpressureConfig (gossip/backpressure), PeerIdRotationConfig (types/config).
      Nested configs are placeholders until PRV-*/ERL-*/PRI-* land. Default values use crate constants.
  - id: API-004
    section: "4"
    summary: "GossipError enum variants (wraps ClientError)"
    status: verified
    spec_ref: "SPEC.md#4-error-types"
    tests:
      - tests/api_004_tests.rs
    notes: >
      ClientError stored as Arc<ClientError> so GossipError derives Clone (upstream ClientError is not Clone).
      ERLAY variants SketchError / SketchDecodeFailed added. API-001 variants InvalidConfig / AlreadyStarted retained.
  - id: API-005
    section: "2.4"
    summary: "PeerConnection wraps chia-sdk-client::Peer with metadata"
    status: verified
    spec_ref: "SPEC.md#24-peerconnection"
    tests:
      - tests/api_005_tests.rs
    notes: >
      peer_id_from_tls_spki_der(spki_der) = SHA256(SPKI DER) for SubjectPublicKeyInfo raw bytes; re-exported at crate root.
      sha2 dependency for hash; x509-parser dev-dep for PEM tests only. PeerReputation gains PartialEq for assertions.
  - id: API-006
    section: "2.5"
    summary: "PeerReputation and PenaltyReason"
    status: verified
    spec_ref: "SPEC.md#25-peerreputation"
    tests:
      - tests/api_006_tests.rs
    notes: >
      PenaltyReason variants and penalty_points() align with CON-007; PeerReputation applies saturating penalties,
      timed ban at PENALTY_BAN_THRESHOLD with BAN_DURATION_SECS, refresh_ban_status clears expired bans, RTT_WINDOW_SIZE
      rolling mean + score (trust *1/avg,0 when no RTT). gossip_handle penalize_peer uses reason.penalty_points().
      PartialEq without Eq (f64 score field).
  - id: API-007
    section: "2.2, 2.7"
    summary: "PeerId type alias and PeerInfo with get_group/get_key"
    status: verified
    spec_ref: "SPEC.md#22-peerid"
    tests:
      - tests/api_007_tests.rs
    notes: >
      PeerId remains Bytes32 alias. PeerInfo { host, port } implements Chia-style get_group (/16 IPv4,
      32-bit prefix IPv6, IPv4-mapped normalization, SHA-256 hostname fallback) and get_key
      (addr||port_be or SHA256(host)||port_be). Replaces earlier stub PeerInfo { peer_id } unused by implementation.
  - id: API-008
    section: "3.4"
    summary: "GossipStats and RelayStats"
    status: verified
    spec_ref: "SPEC.md#34-statistics"
    tests:
      - tests/api_008_tests.rs
    notes: >
      Full field sets per API-008; ServiceState holds messages_sent, messages_received, byte counters (stub 0),
      total_connections. stats() snapshots peers (in/out split), seen LRU len, known_addresses=0 until DSC-001.
      relay_connected/relay_peer_count stub false/0; relay_stats() is Some(default) when relay configured.
      Renamed prior messages_broadcast_total surface to messages_sent.
