  - id: CON-009
    section: "5.3"
    summary: "Mandatory mutual TLS (mTLS) via chia-ssl on ALL P2P connections. Both sides present certs. No unencrypted or server-only TLS."
    status: gap
    spec_ref: "docs/requirements/domains/connection/specs/CON-009.md"
    tests: []
    notes: "Hard security requirement. mTLS — both sides present chia-ssl certs. PeerId = SHA256(remote_cert_pubkey). Relay connections exempt (standard wss://)."
