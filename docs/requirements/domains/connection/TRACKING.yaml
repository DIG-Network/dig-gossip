domain_id: connection
normative: ./NORMATIVE.md
verification: ./VERIFICATION.md
items:
  - id: CON-001
    section: "5.1"
    summary: "Outbound connection via connect_peer()"
    status: verified
    spec_ref: "SPEC.md#51-outbound-connection-reuses-chia-sdk-client"
    tests:
      - tests/con_001_tests.rs
    notes: >
      connection/outbound.rs mirrors chia-sdk connect_peer + returns Handshake + remote SPKI for PeerId + PeerConnection fields.
      GossipHandle::connect_to uses TLS connector, RequestPeers, AddressManager::add_to_new_table; PeerSlot::Live stores Peer;
      inbound_rx forwarded to broadcast hub. API-002/API-008 offline tests use __connect_stub_peer_with_direction.
      lib.rs re-exports create_native_tls_connector when feature native-tls (create_rustls_connector when rustls-only).
  - id: CON-002
    section: "5.2"
    summary: "Inbound connection listener"
    status: verified
    spec_ref: "SPEC.md#52-inbound-connection"
    tests:
      - tests/con_002_tests.rs
    notes: >
      connection/listener.rs: TcpListener + native_tls accept + raw WSS handshake/RequestPeers handling then
      Peer::from_websocket; accept_loop respects max_connections; relay TimestampedPeerInfo via RespondPeers to live peers;
      AddressManager::add_to_new_table. GossipService::start binds listener task; stop aborts/awaits join without holding mutex
      across await. Windows may use peer_id_for_addr when remote leaf cert unavailable (CON-009).
  - id: CON-003
    section: "5.1, 5.2"
    summary: "Handshake validation"
    status: verified
    spec_ref: "SPEC.md#51-outbound-connection-reuses-chia-sdk-client"
    tests:
      - tests/con_003_tests.rs
    notes: >
      connection/handshake.rs: sanitize_software_version (Unicode Cc/Cf via unicode-general-category),
      protocol_version >= MIN_COMPATIBLE_PROTOCOL_VERSION, network_id match, 128-byte post-sanitize cap;
      validate_remote_handshake shared by outbound.rs and listener.rs. LiveSlot stores remote_protocol_version
      + remote_software_version_sanitized. GossipHandle::__con003_peer_versions_for_tests for integration proof.
  - id: CON-004
    section: "2.13"
    summary: "Keepalive via Ping/Pong"
    status: verified
    spec_ref: "SPEC.md#213-constants"
    tests:
      - tests/con_004_tests.rs
    notes: >
      connection/keepalive.rs: periodic RequestPeers/RespondPeers probe (chia-protocol 0.26 has no wire Ping/Pong);
      PING_INTERVAL_SECS / PEER_TIMEOUT_SECS with GossipConfig overrides for tests; RTT via PeerReputation::record_rtt_ms;
      disconnect + ConnectionIssue penalty on failure or staleness. spawn on outbound connect and inbound listener path.
  - id: CON-005
    section: "5.3"
    summary: "Per-connection rate limiting"
    status: verified
    spec_ref: "SPEC.md#53-rate-limiting"
    tests:
      - tests/con_005_tests.rs
    notes: >
      connection/inbound_limits.rs: V2_RATE_LIMITS clone + dig_wire 200–208; vendor RateLimiter dig extension path;
      LiveSlot.inbound_rate_limiter + reputation Arc<Mutex> for nested-lock safety; listener + gossip_handle forwarders
      gate on handle_message before broadcast; apply_inbound_rate_limit_violation → RateLimitExceeded penalty.
  - id: CON-006
    section: "2.4"
    summary: "Connection metrics tracking"
    status: verified
    spec_ref: "SPEC.md#24-peerconnection-dig-extension-of-chia-sdk-clientpeer"
    tests:
      - tests/con_006_tests.rs
    notes: >
      types/peer.rs: PeerConnection messages_sent/messages_received + record_* + message_wire_len +
      PeerConnectionWireMetrics; LiveSlot.traffic Arc<Mutex>; listener + gossip_handle forwarders +
      keepalive request_raw meter inbound; broadcast/send_to meter live sends; stub + __inject use
      ServiceState atomics; GossipHandle::stats sums live + atomics (API-008 doc alignment).
  - id: CON-007
    section: "2.5, 2.13"
    summary: "Peer banning via reputation"
    status: verified
    spec_ref: "SPEC.md#25-peerreputation-dig-extension"
    tests:
      - tests/con_007_tests.rs
    notes: >
      types/reputation.rs: idempotent apply_penalty + refresh_ban_status/check_unban with penalty reset;
      ServiceState: DigBanEntry map + chia_ip_bans ClientState; prune + enforce_timed_ban;
      gossip_handle/listener/keepalive wiring; rate-limit spawn path to enforce_timed_ban_and_disconnect.
  - id: CON-008
    section: "5.1, 5.2"
    summary: "Version string sanitization"
    status: gap
    spec_ref: "SPEC.md#51-outbound-connection-reuses-chia-sdk-client"
    tests: []
    notes: ""

  - id: CON-009
    section: "5.3"
    summary: "Mandatory mutual TLS (mTLS) via chia-ssl on ALL P2P connections. Both sides present certs. No unencrypted or server-only TLS."
    status: gap
    spec_ref: "docs/requirements/domains/connection/specs/CON-009.md"
    tests: []
    notes: "Hard security requirement. mTLS — both sides present chia-ssl certs. PeerId = SHA256(remote_cert_pubkey). Relay connections exempt (standard wss://)."
